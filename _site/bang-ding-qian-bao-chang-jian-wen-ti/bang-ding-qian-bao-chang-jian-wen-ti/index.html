<hr />
<h4 id="q1为什么需要绑定钱包可以换绑吗"><strong>Q1：为什么需要绑定钱包？可以换绑吗？</strong></h4>

<p>A：绑定的钱包是平台识别您身份的方式，一个钱包代表一个账号。目前不支持换绑。</p>
<figure><img src="/CoinAgentDoc-ApiDoc.github.io/.gitbook/assets/b1.png" alt="" /><figcaption></figcaption></figure>
<hr />

<h4 id="q2算力是从哪里扣用什么充值"><strong>Q2：算力是从哪里扣？用什么充值？</strong></h4>

<p>A：算力充值来自 <strong>您绑定钱包内的 USDT</strong>。</p>
<figure><img src="/CoinAgentDoc-ApiDoc.github.io/.gitbook/assets/b2.png" alt="" /><figcaption></figcaption></figure>
