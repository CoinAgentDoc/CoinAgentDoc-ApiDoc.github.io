<h4 id="q1算力如何充值"><strong>Q1：算力如何充值？</strong></h4>

<p>A：您钱包里的 1 USDT = 100 算力。链上充值后后台检测到账，会自动入账（可能略有延迟）。</p>
<figure><img src="/.gitbook/assets/s1.png" alt="" /><figcaption></figcaption></figure>

<hr />

<h4 id="q2算力如何扣除"><strong>Q2：算力如何扣除？</strong></h4>

<p>A：每笔策略结束后，按您的盈利扣算力：<strong>盈利 10 USDT → 扣 1 点算力</strong></p>
<figure><img src="/.gitbook/assets/s2.png" alt="" /><figcaption></figcaption></figure>
